AutoName: ObtainX

RepoType: git
Repo: https://github.com/bikram-agarwal/ObtainX.git

Builds:
  - versionName: 2.8.1
    versionCode: 38101
    commit: v2.8.1
    sudo:
      - mkdir -p /home/runner
      - chown vagrant /home/runner
    output: build/app/outputs/flutter-apk/app-x86_64-fdroid-release.apk
    binary: 
      https://github.com/bikram-agarwal/ObtainX/releases/download/v%v/ObtainX-v%v-fdroid-x86_64.apk
    srclibs:
      - reproducible-apk-tools@719c3471fd1bcb807510dc8e035a69e395ca37f4
      - flutter@stable
    prebuild:
      - git -C $$flutter$$ checkout -f 3.44.2
      - export repo=/home/runner/work/ObtainX
      - mkdir -p $repo
      - cd ..
      - mv dev.bikram.obtainx $repo/ObtainX
      - pushd $repo/ObtainX
      - export PUB_CACHE=$(pwd)/.pub-cache
      - sed -i 's/signingConfigs\.getByName("release")/signingConfigs.maybeCreate("release")/g'
        android/app/build.gradle.kts
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - popd
      - mv $repo/ObtainX dev.bikram.obtainx
    scanignore:
      - assets/translations/package.json
    scandelete:
      - .pub-cache
    build:
      - export repo=/home/runner/work/ObtainX
      - cd ..
      - mv dev.bikram.obtainx $repo/ObtainX
      - pushd $repo/ObtainX
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform="android-x64"
        --flavor fdroid -t lib/main_fdroid.dart
      - popd
      - mv $repo/ObtainX dev.bikram.obtainx
    postbuild:
      - mv $$OUT$$ unaligned.apk
      - $$reproducible-apk-tools$$/zipalign.py --page-size 16 --pad-like-apksigner
        --replace unaligned.apk $$OUT$$

